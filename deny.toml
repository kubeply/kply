[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
]

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "MIT",
  "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = [
  { crate = "ring", allow = ["ISC"] },
  { crate = "rustls-webpki", allow = ["ISC"] },
  { crate = "subtle", allow = ["BSD-3-Clause"] },
  { crate = "untrusted", allow = ["ISC"] },
]

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip = [
  { crate = "getrandom@0.2.17", reason = "required by ring while tempfile has moved to getrandom 0.4" },
]
