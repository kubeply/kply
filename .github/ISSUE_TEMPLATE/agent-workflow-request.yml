name: Agent workflow request
description: Request a safer workflow for Codex, Claude Code, Cursor, or another terminal agent.
title: "agent workflow: "
labels:
  - agent-workflow
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this for workflows where an agent needs safer Kubernetes session tools.
        Mark check failures clearly so repeated verification gaps can be tracked.
        Do not include Secret values, tokens, credentials, or private hostnames.
  - type: input
    id: agent
    attributes:
      label: Agent or tool
      description: Which terminal agent or coding tool should use Kply?
      placeholder: Codex, Claude Code, Cursor, custom agent
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Desired workflow
      description: Describe what the agent should inspect, plan, verify, report, or avoid.
    validations:
      required: true
  - type: textarea
    id: current-commands
    attributes:
      label: Current manual or agent commands
      description: List the commands humans or agents run today, with sensitive data removed.
      render: shell
    validations:
      required: true
  - type: textarea
    id: failure-mode
    attributes:
      label: Failure mode to prevent
      description: What unsafe action, confusing output, missing check, or broken infra behavior should Kply prevent?
    validations:
      required: true
  - type: dropdown
    id: check-failure
    attributes:
      label: Check failure
      description: Classify the verification behavior that failed, misled, or was missing.
      options:
        - existing check bug
        - repeated check failure
        - missing readiness check
        - missing service endpoint check
        - missing route check
        - misleading check evidence
        - missing skipped-check reason
        - not a check failure
        - not sure
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Useful Kply behavior
      description: What CLI command, report, check, or workflow would make this safe enough to try?
    validations:
      required: true
