name: Kply
description: Run Kply safely in pull request workflows.
author: Kubeply

branding:
  icon: shield
  color: blue

inputs:
  version:
    description: Kply release version to install, or latest.
    required: false
    default: latest
  config-path:
    description: Path to the kply.yaml config file.
    required: false
    default: kply.yaml
  app:
    description: Configured app name to plan or check.
    required: false
  image:
    description: Candidate image reference for the sandbox workload.
    required: false
  mode:
    description: Action mode to run. Plan mode is the first supported target.
    required: false
    default: plan
  output-path:
    description: Path where the action will write the JSON output artifact.
    required: false
    default: kply-report.json
  github-token:
    description: GitHub token used to read Kply release metadata.
    required: false

outputs:
  kply-path:
    description: Absolute path to the installed kply binary.
    value: ${{ steps.install.outputs.kply_path }}
  kply-version:
    description: Version string reported by the installed kply binary.
    value: ${{ steps.install.outputs.kply_version }}

runs:
  using: composite
  steps:
    - name: Resolve Kply release asset
      id: resolve
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        KPLY_RELEASE_REPOSITORY: kubeply/kply
      run: |
        set -euo pipefail

        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            target="x86_64-unknown-linux-gnu"
            ;;
          Linux-ARM64)
            target="aarch64-unknown-linux-gnu"
            ;;
          macOS-X64)
            target="x86_64-apple-darwin"
            ;;
          macOS-ARM64)
            target="aarch64-apple-darwin"
            ;;
          *)
            echo "::error::Unsupported runner platform ${RUNNER_OS}-${RUNNER_ARCH}; use Linux or macOS x64/arm64."
            exit 1
            ;;
        esac

        if [[ "${INPUT_VERSION}" == "latest" ]]; then
          release_api="https://api.github.com/repos/${KPLY_RELEASE_REPOSITORY}/releases/latest"
        else
          version="${INPUT_VERSION}"
          if [[ "${version}" != v* ]]; then
            version="v${version}"
          fi
          release_api="https://api.github.com/repos/${KPLY_RELEASE_REPOSITORY}/releases/tags/${version}"
        fi

        auth_args=()
        if [[ -n "${INPUT_GITHUB_TOKEN}" ]]; then
          auth_args=(-H "Authorization: Bearer ${INPUT_GITHUB_TOKEN}")
        fi

        release_json="${RUNNER_TEMP}/kply-release.json"
        curl --fail --location --silent --show-error \
          -H "Accept: application/vnd.github+json" \
          "${auth_args[@]}" \
          "${release_api}" > "${release_json}"

        asset_info="$(python3 - "${release_json}" "${target}" <<'PY'
        import json
        import sys

        release_path, target = sys.argv[1], sys.argv[2]
        with open(release_path, encoding="utf-8") as handle:
            release = json.load(handle)

        supported_suffixes = (".tar.xz", ".tar.gz", ".tgz", ".zip")
        for asset in release.get("assets", []):
            name = asset.get("name", "")
            if target not in name:
                continue
            if name.endswith((".sha256", ".sha256sum", ".sig", ".pem", ".json")):
                continue
            if not name.endswith(supported_suffixes):
                continue
            url = asset.get("browser_download_url")
            if url:
                print(f"{name}\n{url}")
                sys.exit(0)

        tag = release.get("tag_name", "<unknown>")
        print(f"no supported kply release asset found for target {target} in {tag}", file=sys.stderr)
        sys.exit(1)
        PY
        )"

        archive_name="$(printf '%s\n' "${asset_info}" | sed -n '1p')"
        archive_url="$(printf '%s\n' "${asset_info}" | sed -n '2p')"

        echo "target=${target}" >> "${GITHUB_OUTPUT}"
        echo "archive_name=${archive_name}" >> "${GITHUB_OUTPUT}"
        echo "archive_url=${archive_url}" >> "${GITHUB_OUTPUT}"

    - name: Install Kply
      id: install
      shell: bash
      env:
        ARCHIVE_NAME: ${{ steps.resolve.outputs.archive_name }}
        ARCHIVE_URL: ${{ steps.resolve.outputs.archive_url }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        install_dir="${RUNNER_TEMP}/kply-bin"
        archive_path="${RUNNER_TEMP}/${ARCHIVE_NAME}"
        mkdir -p "${install_dir}"

        auth_args=()
        if [[ -n "${INPUT_GITHUB_TOKEN}" ]]; then
          auth_args=(-H "Authorization: Bearer ${INPUT_GITHUB_TOKEN}")
        fi

        curl --fail --location --silent --show-error \
          "${auth_args[@]}" \
          "${ARCHIVE_URL}" \
          --output "${archive_path}"

        case "${ARCHIVE_NAME}" in
          *.tar.xz | *.tar.gz | *.tgz)
            tar -xf "${archive_path}" -C "${install_dir}"
            ;;
          *.zip)
            unzip -q "${archive_path}" -d "${install_dir}"
            ;;
          *)
            echo "::error::Unsupported Kply archive format: ${ARCHIVE_NAME}"
            exit 1
            ;;
        esac

        kply_path="$(find "${install_dir}" -type f -name kply -perm -111 | head -n 1)"
        if [[ -z "${kply_path}" ]]; then
          kply_path="$(find "${install_dir}" -type f -name kply | head -n 1)"
        fi
        if [[ -z "${kply_path}" ]]; then
          echo "::error::Downloaded Kply archive did not contain a kply binary."
          exit 1
        fi

        chmod +x "${kply_path}"
        kply_dir="$(dirname "${kply_path}")"
        echo "${kply_dir}" >> "${GITHUB_PATH}"

        kply_version="$("${kply_path}" --version)"
        echo "kply_path=${kply_path}" >> "${GITHUB_OUTPUT}"
        echo "kply_version=${kply_version}" >> "${GITHUB_OUTPUT}"
        echo "Installed ${kply_version} at ${kply_path}"
