name: Kply
description: Run Kply safely in pull request workflows.
author: Kubeply

branding:
  icon: shield
  color: blue

inputs:
  version:
    description: Kply release version to install, or latest.
    required: false
    default: latest
  config-path:
    description: Path to the kply.yaml config file.
    required: false
    default: kply.yaml
  app:
    description: Configured app name to plan or check.
    required: false
  image:
    description: Candidate image reference for the sandbox workload.
    required: false
  mode:
    description: Action mode to run. Plan mode is supported; check mode is reserved for a later runtime.
    required: false
    default: plan
  output-path:
    description: Path where the action will write the JSON output artifact.
    required: false
    default: kply-report.json
  artifact-name:
    description: GitHub Actions artifact name for the Kply JSON report.
    required: false
    default: kply-report
  write-summary:
    description: Whether to append a Markdown summary to the GitHub Actions step summary.
    required: false
    default: "true"
  github-token:
    description: GitHub token used to read Kply release metadata.
    required: false

outputs:
  kply-path:
    description: Absolute path to the installed kply binary.
    value: ${{ steps.install.outputs.kply_path }}
  kply-version:
    description: Version string reported by the installed kply binary.
    value: ${{ steps.install.outputs.kply_version }}
  config-path:
    description: Absolute path to the resolved kply.yaml config file.
    value: ${{ steps.config.outputs.config_path }}
  app:
    description: Configured app name validated by kply app inspect.
    value: ${{ steps.app.outputs.app }}
  image:
    description: Candidate image reference validated by kply session plan, when provided.
    value: ${{ steps.image.outputs.image }}
  mode:
    description: Action mode that was executed.
    value: ${{ steps.run.outputs.mode }}
  output-path:
    description: Absolute path to the JSON report written by the action.
    value: ${{ steps.run.outputs.output_path }}
  artifact-name:
    description: GitHub Actions artifact name used for the uploaded JSON report.
    value: ${{ inputs.artifact-name }}
  write-summary:
    description: Whether the action wrote a Markdown step summary.
    value: ${{ steps.summary.outputs.write_summary }}

runs:
  using: composite
  steps:
    - name: Resolve Kply release asset
      id: resolve
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        KPLY_RELEASE_REPOSITORY: kubeply/kply
      run: |
        set -euo pipefail

        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            target="x86_64-unknown-linux-gnu"
            ;;
          Linux-ARM64)
            target="aarch64-unknown-linux-gnu"
            ;;
          macOS-X64)
            target="x86_64-apple-darwin"
            ;;
          macOS-ARM64)
            target="aarch64-apple-darwin"
            ;;
          *)
            echo "::error::Unsupported runner platform ${RUNNER_OS}-${RUNNER_ARCH}; use Linux or macOS x64/arm64."
            exit 1
            ;;
        esac

        if [[ "${INPUT_VERSION}" == "latest" ]]; then
          release_api="https://api.github.com/repos/${KPLY_RELEASE_REPOSITORY}/releases/latest"
        else
          version="${INPUT_VERSION}"
          if [[ "${version}" != v* ]]; then
            version="v${version}"
          fi
          release_api="https://api.github.com/repos/${KPLY_RELEASE_REPOSITORY}/releases/tags/${version}"
        fi

        auth_args=()
        if [[ -n "${INPUT_GITHUB_TOKEN}" ]]; then
          auth_args=(-H "Authorization: Bearer ${INPUT_GITHUB_TOKEN}")
        fi

        release_json="${RUNNER_TEMP}/kply-release.json"
        curl --fail --location --silent --show-error \
          --connect-timeout 30 \
          --max-time 60 \
          --retry 3 \
          --retry-delay 2 \
          -H "Accept: application/vnd.github+json" \
          "${auth_args[@]}" \
          "${release_api}" > "${release_json}"

        asset_info="$(python3 - "${release_json}" "${target}" <<'PY'
        import json
        import sys

        release_path, target = sys.argv[1], sys.argv[2]
        with open(release_path, encoding="utf-8") as handle:
            release = json.load(handle)

        supported_suffixes = (".tar.xz", ".tar.gz", ".tgz", ".zip")
        checksum_suffixes = (".sha256", ".sha256sum")
        assets_by_name = {
            asset.get("name", ""): asset
            for asset in release.get("assets", [])
            if asset.get("name")
        }

        for asset in release.get("assets", []):
            name = asset.get("name", "")
            if target not in name:
                continue
            if name.endswith(checksum_suffixes + (".sig", ".pem", ".json")):
                continue
            if not name.endswith(supported_suffixes):
                continue
            url = asset.get("browser_download_url")
            checksum_asset = None
            for checksum_suffix in checksum_suffixes:
                checksum_asset = assets_by_name.get(f"{name}{checksum_suffix}")
                if checksum_asset is not None:
                    break
            checksum_url = checksum_asset.get("browser_download_url") if checksum_asset else None
            if url and checksum_url:
                print(f"{name}\n{url}\n{checksum_asset['name']}\n{checksum_url}")
                sys.exit(0)

        tag = release.get("tag_name", "<unknown>")
        print(
            f"no supported kply release asset with checksum found for target {target} in {tag}",
            file=sys.stderr,
        )
        sys.exit(1)
        PY
        )"

        archive_name="$(printf '%s\n' "${asset_info}" | sed -n '1p')"
        archive_url="$(printf '%s\n' "${asset_info}" | sed -n '2p')"
        checksum_name="$(printf '%s\n' "${asset_info}" | sed -n '3p')"
        checksum_url="$(printf '%s\n' "${asset_info}" | sed -n '4p')"

        echo "target=${target}" >> "${GITHUB_OUTPUT}"
        echo "archive_name=${archive_name}" >> "${GITHUB_OUTPUT}"
        echo "archive_url=${archive_url}" >> "${GITHUB_OUTPUT}"
        echo "checksum_name=${checksum_name}" >> "${GITHUB_OUTPUT}"
        echo "checksum_url=${checksum_url}" >> "${GITHUB_OUTPUT}"

    - name: Install Kply
      id: install
      shell: bash
      env:
        ARCHIVE_NAME: ${{ steps.resolve.outputs.archive_name }}
        ARCHIVE_URL: ${{ steps.resolve.outputs.archive_url }}
        CHECKSUM_NAME: ${{ steps.resolve.outputs.checksum_name }}
        CHECKSUM_URL: ${{ steps.resolve.outputs.checksum_url }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        install_dir="$(mktemp -d "${RUNNER_TEMP}/kply-bin.XXXXXX")"
        archive_path="${install_dir}/${ARCHIVE_NAME}"
        checksum_path="${install_dir}/${CHECKSUM_NAME}"

        auth_args=()
        if [[ -n "${INPUT_GITHUB_TOKEN}" ]]; then
          auth_args=(-H "Authorization: Bearer ${INPUT_GITHUB_TOKEN}")
        fi

        curl --fail --location --silent --show-error \
          --connect-timeout 30 \
          --max-time 300 \
          --retry 3 \
          --retry-delay 2 \
          "${auth_args[@]}" \
          "${ARCHIVE_URL}" \
          --output "${archive_path}"

        curl --fail --location --silent --show-error \
          --connect-timeout 30 \
          --max-time 60 \
          --retry 3 \
          --retry-delay 2 \
          "${auth_args[@]}" \
          "${CHECKSUM_URL}" \
          --output "${checksum_path}"

        python3 - "${archive_path}" "${checksum_path}" <<'PY'
        import hashlib
        import re
        import sys

        archive_path, checksum_path = sys.argv[1], sys.argv[2]
        with open(checksum_path, encoding="utf-8") as handle:
            checksum_text = handle.read()

        match = re.search(r"\b([0-9a-fA-F]{64})\b", checksum_text)
        if match is None:
            print("checksum file did not contain a SHA-256 digest", file=sys.stderr)
            sys.exit(1)

        expected = match.group(1).lower()
        digest = hashlib.sha256()
        with open(archive_path, "rb") as handle:
            for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                digest.update(chunk)

        actual = digest.hexdigest()
        if actual != expected:
            print(
                f"checksum verification failed: expected {expected}, got {actual}",
                file=sys.stderr,
            )
            sys.exit(1)
        PY

        case "${ARCHIVE_NAME}" in
          *.tar.xz | *.tar.gz | *.tgz)
            tar -xf "${archive_path}" -C "${install_dir}"
            ;;
          *.zip)
            unzip -q "${archive_path}" -d "${install_dir}"
            ;;
          *)
            echo "::error::Unsupported Kply archive format: ${ARCHIVE_NAME}"
            exit 1
            ;;
        esac
        rm -f "${archive_path}" "${checksum_path}"

        kply_path="$(find "${install_dir}" -type f -name kply -perm -111 | head -n 1)"
        if [[ -z "${kply_path}" ]]; then
          kply_path="$(find "${install_dir}" -type f -name kply | head -n 1)"
        fi
        if [[ -z "${kply_path}" ]]; then
          echo "::error::Downloaded Kply archive did not contain a kply binary."
          exit 1
        fi

        chmod +x "${kply_path}"
        kply_dir="$(dirname "${kply_path}")"
        echo "${kply_dir}" >> "${GITHUB_PATH}"

        kply_version="$("${kply_path}" --version)"
        echo "kply_path=${kply_path}" >> "${GITHUB_OUTPUT}"
        echo "kply_version=${kply_version}" >> "${GITHUB_OUTPUT}"
        echo "Installed ${kply_version} at ${kply_path}"

    - name: Resolve Kply config path
      id: config
      shell: bash
      env:
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        set -euo pipefail

        if [[ -z "${INPUT_CONFIG_PATH}" ]]; then
          echo "::error::config-path must not be empty."
          exit 1
        fi

        workspace="${GITHUB_WORKSPACE:-${PWD}}"
        case "${INPUT_CONFIG_PATH}" in
          /*)
            config_path="${INPUT_CONFIG_PATH}"
            ;;
          *)
            config_path="${workspace}/${INPUT_CONFIG_PATH}"
            ;;
        esac

        if [[ ! -f "${config_path}" ]]; then
          echo "::error::Kply config file was not found at ${config_path}."
          exit 1
        fi

        resolved_config_path="$(python3 - "${config_path}" <<'PY'
        import os
        import sys

        print(os.path.abspath(sys.argv[1]))
        PY
        )"

        echo "config_path=${resolved_config_path}" >> "${GITHUB_OUTPUT}"
        echo "Using Kply config at ${resolved_config_path}"

    - name: Validate Kply app
      id: app
      shell: bash
      env:
        INPUT_APP: ${{ inputs.app }}
        KPLY_PATH: ${{ steps.install.outputs.kply_path }}
        CONFIG_PATH: ${{ steps.config.outputs.config_path }}
      run: |
        set -euo pipefail

        if [[ -z "${INPUT_APP}" ]]; then
          echo "::error::app must not be empty."
          exit 1
        fi

        app_inspect_json="$(mktemp "${RUNNER_TEMP}/kply-app.XXXXXX.json")"
        trap 'rm -f "${app_inspect_json}"' EXIT
        "${KPLY_PATH}" \
          app inspect "${INPUT_APP}" \
          --config "${CONFIG_PATH}" \
          --json \
          --quiet \
          --no-color > "${app_inspect_json}"

        echo "app=${INPUT_APP}" >> "${GITHUB_OUTPUT}"
        echo "Validated Kply app ${INPUT_APP}"

    - name: Validate Kply image override
      id: image
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        KPLY_PATH: ${{ steps.install.outputs.kply_path }}
        CONFIG_PATH: ${{ steps.config.outputs.config_path }}
        APP: ${{ steps.app.outputs.app }}
      run: |
        set -euo pipefail

        if [[ -z "${INPUT_IMAGE}" ]]; then
          echo "image=" >> "${GITHUB_OUTPUT}"
          echo "No Kply image override configured"
          exit 0
        fi

        if [[ "${INPUT_IMAGE}" == *$'\n'* || "${INPUT_IMAGE}" == *$'\r'* ]]; then
          echo "::error::image must be a single-line reference."
          exit 1
        fi

        image_plan_json="$(mktemp "${RUNNER_TEMP}/kply-image-plan.XXXXXX.json")"
        trap 'rm -f "${image_plan_json}"' EXIT
        "${KPLY_PATH}" \
          session plan "${APP}" \
          --config "${CONFIG_PATH}" \
          --image "${INPUT_IMAGE}" \
          --json \
          --quiet \
          --no-color > "${image_plan_json}"

        echo "image=${INPUT_IMAGE}" >> "${GITHUB_OUTPUT}"
        echo "Validated Kply image override ${INPUT_IMAGE}"

    - name: Run Kply plan
      id: run
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        KPLY_PATH: ${{ steps.install.outputs.kply_path }}
        CONFIG_PATH: ${{ steps.config.outputs.config_path }}
        APP: ${{ steps.app.outputs.app }}
        IMAGE: ${{ steps.image.outputs.image }}
      run: |
        set -euo pipefail

        case "${INPUT_MODE}" in
          plan)
            ;;
          check)
            echo "::error::mode=check is reserved for the later live-check action runtime. Use mode=plan for now."
            exit 1
            ;;
          *)
            echo "::error::Unsupported Kply action mode ${INPUT_MODE}. Use mode=plan."
            exit 1
            ;;
        esac

        if [[ -z "${INPUT_OUTPUT_PATH}" ]]; then
          echo "::error::output-path must not be empty."
          exit 1
        fi
        if [[ "${INPUT_OUTPUT_PATH}" == *$'\n'* || "${INPUT_OUTPUT_PATH}" == *$'\r'* ]]; then
          echo "::error::output-path must be a single-line path."
          exit 1
        fi

        workspace="${GITHUB_WORKSPACE:-${PWD}}"
        case "${INPUT_OUTPUT_PATH}" in
          /*)
            output_path="${INPUT_OUTPUT_PATH}"
            ;;
          *)
            output_path="${workspace}/${INPUT_OUTPUT_PATH}"
            ;;
        esac

        resolved_output_path="$(python3 - "${output_path}" "${workspace}" <<'PY'
        import os
        import sys

        candidate = os.path.abspath(sys.argv[1])
        workspace = os.path.abspath(sys.argv[2])
        if os.path.commonpath([candidate, workspace]) != workspace:
            print(
                f"::error::output-path must resolve inside {workspace}, got {candidate}.",
                file=sys.stderr,
            )
            sys.exit(1)
        print(candidate)
        PY
        )"
        mkdir -p "$(dirname "${resolved_output_path}")"

        plan_args=(
          session plan "${APP}"
          --config "${CONFIG_PATH}"
          --json
          --quiet
          --no-color
        )
        if [[ -n "${IMAGE}" ]]; then
          plan_args+=(--image "${IMAGE}")
        fi

        "${KPLY_PATH}" "${plan_args[@]}" > "${resolved_output_path}"

        echo "mode=plan" >> "${GITHUB_OUTPUT}"
        echo "output_path=${resolved_output_path}" >> "${GITHUB_OUTPUT}"
        echo "Wrote Kply plan JSON to ${resolved_output_path}"

    - name: Upload Kply JSON report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.run.outputs.output_path }}
        if-no-files-found: error

    - name: Write Kply Markdown summary
      id: summary
      shell: bash
      env:
        INPUT_WRITE_SUMMARY: ${{ inputs.write-summary }}
        APP: ${{ steps.app.outputs.app }}
        MODE: ${{ steps.run.outputs.mode }}
        OUTPUT_PATH: ${{ steps.run.outputs.output_path }}
      run: |
        set -euo pipefail

        case "${INPUT_WRITE_SUMMARY}" in
          true)
            ;;
          false)
            echo "Kply Markdown summary disabled"
            echo "write_summary=false" >> "${GITHUB_OUTPUT}"
            exit 0
            ;;
          *)
            echo "::error::write-summary must be true or false."
            exit 1
            ;;
        esac

        if [[ -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
          echo "GitHub step summary is unavailable"
          echo "write_summary=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        python3 - "${OUTPUT_PATH}" "${GITHUB_STEP_SUMMARY}" "${APP}" "${MODE}" <<'PY'
        import json
        import sys

        output_path, summary_path, app, mode = sys.argv[1:5]

        def scalar(value):
            if value is None:
                return "none"
            text = str(value).replace("\r", " ").replace("\n", " ").strip()
            return text.replace("`", "\\`") or "none"

        with open(output_path, encoding="utf-8") as handle:
            report = json.load(handle)

        workload = report.get("workload") or {}
        workload_parts = [
            scalar(workload.get("namespace")),
            scalar(workload.get("kind")),
            scalar(workload.get("name")),
        ]
        workload_name = "/".join(workload_parts)

        route_selector = report.get("route_selector") or {}
        route_label = scalar(route_selector.get("kind"))
        route_name = scalar(route_selector.get("name"))
        route_value = scalar(route_selector.get("value"))
        route_summary = f"{route_label} {route_name}={route_value}"

        planned_resources = report.get("planned_resources") or []
        planned_checks = report.get("planned_checks") or []
        required_permissions = report.get("required_permissions") or []
        warnings = report.get("unsupported_feature_warnings") or []
        risk_notes = report.get("risk_notes") or []

        lines = [
            "## Kply plan",
            "",
            f"- Mode: `{scalar(mode)}`",
            f"- App: `{scalar(app)}`",
            f"- Status: `{scalar(report.get('status'))}`",
            f"- Session: `{scalar(report.get('id'))}`",
            f"- Workload: `{workload_name}`",
            f"- Image: `{scalar(report.get('image'))}`",
            f"- Route selector: `{route_summary}`",
            f"- Planned resources: `{len(planned_resources)}`",
            f"- Planned checks: `{len(planned_checks)}`",
            f"- Required permission rules: `{len(required_permissions)}`",
            f"- Unsupported feature warnings: `{len(warnings)}`",
            f"- Risk notes: `{len(risk_notes)}`",
            "",
        ]

        with open(summary_path, "a", encoding="utf-8") as handle:
            handle.write("\n".join(lines))
        PY
        echo "write_summary=true" >> "${GITHUB_OUTPUT}"
