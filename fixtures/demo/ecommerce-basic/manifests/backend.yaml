apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: kply-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kply-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
      app.kubernetes.io/part-of: kply-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kply-demo
    spec:
      containers:
        - name: checkout
          image: hashicorp/http-echo:1.0
          args:
            - -listen=:8080
            - -text={"status":"ok","service":"checkout-api"}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CATALOG_API_URL
              value: http://catalog-api.kply-demo.svc.cluster.local:8080
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: kply-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kply-demo
spec:
  selector:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kply-demo
  ports:
    - name: http
      port: 8080
      targetPort: http
