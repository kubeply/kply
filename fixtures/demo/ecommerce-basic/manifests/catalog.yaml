apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: kply-demo
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/component: backing-service
    app.kubernetes.io/part-of: kply-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-api
      app.kubernetes.io/part-of: kply-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-api
        app.kubernetes.io/component: backing-service
        app.kubernetes.io/part-of: kply-demo
    spec:
      containers:
        - name: catalog
          image: hashicorp/http-echo:1.0
          args:
            - -listen=:8080
            - -text={"status":"ok","service":"catalog-api"}
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  namespace: kply-demo
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/component: backing-service
    app.kubernetes.io/part-of: kply-demo
spec:
  selector:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/part-of: kply-demo
  ports:
    - name: http
      port: 8080
      targetPort: http
