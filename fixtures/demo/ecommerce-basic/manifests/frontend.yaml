apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront-web
  namespace: kply-demo
  labels:
    app.kubernetes.io/name: storefront-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kply-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-web
      app.kubernetes.io/part-of: kply-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storefront-web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: kply-demo
    spec:
      containers:
        - name: storefront
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          env:
            - name: CHECKOUT_API_URL
              value: http://checkout-api.kply-demo.svc.cluster.local:8080
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-web
  namespace: kply-demo
  labels:
    app.kubernetes.io/name: storefront-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kply-demo
spec:
  selector:
    app.kubernetes.io/name: storefront-web
    app.kubernetes.io/part-of: kply-demo
  ports:
    - name: http
      port: 80
      targetPort: http
